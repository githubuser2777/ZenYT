name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        # Ponytail: Tạm thời chỉ build cho Windows. Nếu muốn build cho Mac/Linux thì thêm 'macos-latest', 'ubuntu-22.04' vào list này
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Dành cho trường hợp sau này bạn muốn build cả bản Linux
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Tauri action tự động thay __VERSION__ bằng version trong tauri.conf.json
          releaseName: "ZenYT v__VERSION__"
          releaseBody: "Tải file setup.exe ở bên dưới để cài đặt."
          releaseDraft: false
          prerelease: false
